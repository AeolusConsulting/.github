<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="50%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="213" y1="0" x2="213" y2="320" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="426" y1="0" x2="426" y2="320" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="320" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="853" y1="0" x2="853" y2="320" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="1066" y1="0" x2="1066" y2="320" stroke="#00D4FF" stroke-width="0.5"/>
  </g>

  <!-- Accent glow top -->
  <rect width="1280" height="160" fill="url(#accentGlow)"/>

  <!-- Decorative circles -->
  <g opacity="0.05">
    <circle cx="200" cy="260" r="200" fill="none" stroke="#00D4FF" stroke-width="1"/>
    <circle cx="1080" cy="60" r="160" fill="none" stroke="#00D4FF" stroke-width="1"/>
  </g>

  <!-- Aeolus Logo Mark - stylized A with wind lines -->
  <g transform="translate(560, 15)">
    <!-- Outer glow circle -->
    <circle cx="80" cy="80" r="58" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

    <!-- A letterform -->
    <path d="M 48 130 L 65 32 L 80 68 L 95 32 L 112 130" fill="none" stroke="#00D4FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- A crossbar -->
    <line x1="62" y1="88" x2="98" y2="88" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Wind lines (streaming right from A) -->
    <g opacity="0.4">
      <path d="M 115 55 Q 135 52 145 58" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 112 70 Q 140 65 155 72" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 120 105 Q 142 108 152 102" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 114 118 Q 130 122 142 116" fill="none" stroke="#00D4FF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Wind lines (streaming left from A) -->
    <g opacity="0.3">
      <path d="M 45 50 Q 25 47 15 53" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 48 68 Q 20 65 5 70" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 40 105 Q 18 108 8 102" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Company name -->
  <text x="640" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">AEOLUS</text>

  <!-- Tagline -->
  <text x="640" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7A7A8A" text-anchor="middle" letter-spacing="3">EDGE-FIRST AI INFRASTRUCTURE &amp; INTELLIGENT SYSTEMS</text>

  <!-- Divider -->
  <line x1="490" y1="215" x2="790" y2="215" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

  <!-- Bottom row -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="370" y="250" font-size="11" fill="#5A5A6A" text-anchor="middle" letter-spacing="2">INFRASTRUCTURE</text>
    <text x="370" y="270" font-size="13" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">Cloudflare · NVIDIA DGX</text>

    <text x="640" y="250" font-size="11" fill="#5A5A6A" text-anchor="middle" letter-spacing="2">STACK</text>
    <text x="640" y="270" font-size="13" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">Edge-native · Production AI</text>

    <text x="910" y="250" font-size="11" fill="#5A5A6A" text-anchor="middle" letter-spacing="2">DOMAIN</text>
    <text x="910" y="270" font-size="13" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">Research → Production</text>
  </g>

  <!-- Bottom fade -->
  <rect y="300" width="1280" height="20" fill="url(#bgGrad)"/>
</svg>
